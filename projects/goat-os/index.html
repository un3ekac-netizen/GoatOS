<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoatOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.10);
      /* Module palettes */
      --ops-primary: #f59e0b;
      --ops-glow: rgba(245, 158, 11, 0.6);
      --ops-muted: rgba(245, 158, 11, 0.15);
      --ops-text: #fbbf24;
      --brain-primary: #38bdf8;
      --brain-glow: rgba(56, 189, 248, 0.5);
      --brain-muted: rgba(56, 189, 248, 0.12);
      --brain-text: #7dd3fc;
      --lab-primary: #22c55e;
      --lab-glow: rgba(34, 197, 94, 0.6);
      --lab-muted: rgba(34, 197, 94, 0.12);
      --lab-text: #4ade80;
      --projects-primary: #a78bfa;
      --projects-glow: rgba(167, 139, 250, 0.5);
      --projects-muted: rgba(167, 139, 250, 0.12);
      --projects-text: #c4b5fd;
    }

    * { font-family: 'Ubuntu', sans-serif; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      overflow: hidden;
      color: #fff;
      margin: 0;
    }

    .font-mono { font-family: 'Ubuntu Mono', monospace !important; }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
    }

    /* Dock */
    .dock-container {
      overflow: hidden;
      border-radius: 16px;
    }
    .glass-dock-item {
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .glass-dock-item:hover {
      background: var(--glass-hover);
      border: 1px solid var(--glass-border);
      transform: scale(1.06);
    }
    .glass-dock-item.active[data-module="ops"] {
      background: var(--ops-muted);
      border-color: var(--ops-primary);
      box-shadow: 0 0 14px var(--ops-glow);
    }
    .glass-dock-item.active[data-module="brain"] {
      background: var(--brain-muted);
      border-color: var(--brain-primary);
      box-shadow: 0 0 14px var(--brain-glow);
    }
    .glass-dock-item.active[data-module="lab"] {
      background: var(--lab-muted);
      border-color: var(--lab-primary);
      box-shadow: 0 0 14px var(--lab-glow);
    }
    .glass-dock-item.active[data-module="projects"] {
      background: var(--projects-muted);
      border-color: var(--projects-primary);
      box-shadow: 0 0 14px var(--projects-glow);
    }

    /* Neon text utility */
    .neon-ops { color: var(--ops-text); text-shadow: 0 0 8px var(--ops-glow), 0 0 20px rgba(245,158,11,0.3); }
    .neon-brain { color: var(--brain-text); text-shadow: 0 0 8px var(--brain-glow), 0 0 20px rgba(56,189,248,0.2); }
    .neon-lab { color: var(--lab-text); text-shadow: 0 0 8px var(--lab-glow), 0 0 20px rgba(34,197,94,0.3); }

    .icon-ops { color: var(--ops-text); filter: drop-shadow(0 0 6px var(--ops-glow)); }
    .icon-brain { color: var(--brain-text); filter: drop-shadow(0 0 6px var(--brain-glow)); }
    .icon-lab { color: var(--lab-text); filter: drop-shadow(0 0 6px var(--lab-glow)); }
    .neon-projects { color: var(--projects-text); text-shadow: 0 0 8px var(--projects-glow), 0 0 20px rgba(167,139,250,0.3); }
    .icon-projects { color: var(--projects-text); filter: drop-shadow(0 0 6px var(--projects-glow)); }

    /* Tabs */
    .module-tab {
      background: transparent;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      cursor: grab;
      user-select: none;
      font-family: 'Ubuntu', sans-serif;
    }
    .module-tab:hover { background: rgba(255,255,255,0.06); }
    .module-tab.dragging { opacity: 0.5; cursor: grabbing; }

    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dashboard-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s ease;
    }
    .dashboard-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.10);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-dot.online { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.4); }
    .status-dot.offline { background: #ef4444; }
    .status-dot.warning { background: #fbbf24; }

    /* File paths and URLs rendered lighter */
    .font-mono { word-break: break-all; }
    .build-path, a, [href] { color: rgba(255,255,255,0.65); }

    /* Theme picker */
    .theme-picker-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 60;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
    }
    .theme-picker-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); transform: scale(1.05); }
    .theme-panel {
      position: fixed;
      bottom: 62px;
      right: 12px;
      z-index: 60;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px;
      display: none;
      animation: fadeIn 0.2s ease;
      width: 210px;
    }
    .theme-panel.open { display: block; }
    .theme-swatch {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      background: transparent;
      font-family: 'Ubuntu', sans-serif;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
    }
    .theme-swatch:hover { background: rgba(255,255,255,0.06); }
    .theme-swatch.active { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
    .theme-dots { display: flex; gap: 3px; }
    .theme-dot { width: 14px; height: 14px; border-radius: 50%; }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 60px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 20px;
      min-width: 280px;
      max-width: 400px;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.success { border-color: rgba(34,197,94,0.3); }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast.info { border-color: rgba(56,189,248,0.3); }
    .toast-icon { flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); }
    .toast-msg { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; font-family: 'Ubuntu Mono', monospace; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(40px); }
    }

    /* Sync button */
    .sync-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      color: white;
      font-family: 'Ubuntu', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(34,197,94,0.25), 0 0 0 0 rgba(34,197,94,0);
      letter-spacing: 0.3px;
    }
    .sync-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 24px rgba(34,197,94,0.35), 0 0 20px rgba(34,197,94,0.15);
    }
    .sync-btn:active {
      transform: translateY(0) scale(0.98);
    }
    .sync-btn.syncing {
      opacity: 0.7;
      pointer-events: none;
    }
    .sync-btn .sync-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .sync-btn.syncing .sync-spinner { display: block; }
    .sync-btn.syncing .sync-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Kanban */
    .kanban-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .kanban-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .kanban-card.dragging { opacity: 0.4; transform: scale(0.95); }
    .kanban-col.drag-over { background: rgba(245,158,11,0.05); border-radius: 12px; outline: 1px dashed rgba(245,158,11,0.25); }
    .priority-critical { border-left: 3px solid #ef4444; }
    .priority-high { border-left: 3px solid #f59e0b; }
    .priority-medium { border-left: 3px solid #38bdf8; }
    .priority-low { border-left: 3px solid rgba(255,255,255,0.2); }
    .stage-badge { font-size: 10px; font-family: 'Ubuntu Mono', monospace; padding: 2px 8px; border-radius: 6px; }
    .stage-new { background: rgba(56,189,248,0.15); color: #7dd3fc; }
    .stage-in-progress { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .stage-pending { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .stage-done { background: rgba(74,222,128,0.15); color: #4ade80; }
    .stage-albs-approval { background: rgba(167,139,250,0.15); color: #c4b5fd; }
    .sla-ok { color: rgba(255,255,255,0.4); }
    .sla-warning { color: #fbbf24; }
    .sla-overdue { color: #ef4444; }

    /* Org chart */
    .org-node {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
      position: relative;
    }
    .org-node:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
    }
    .org-node.human { border-color: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.15); }
    .org-node.goat { border-color: var(--ops-primary); box-shadow: 0 0 12px var(--ops-muted); }
    .org-node.agent { border-color: var(--brain-primary); }
    .org-node.subagent { border-color: rgba(168,85,247,0.6); border-style: dashed; background: rgba(168,85,247,0.1); box-shadow: 0 0 8px rgba(168,85,247,0.15); }
    .org-connector {
      position: absolute;
      background: rgba(100,140,200,0.25);
    }
    .org-vline { width: 1px; left: 50%; }
    .org-hline { height: 1px; top: 0; }
    .pulse-line {
      background: rgba(120,80,220,0.25);
      position: relative;
      overflow: hidden;
    }
    .pulse-line::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(147,51,234,0.0) 0%, rgba(147,51,234,0.8) 30%, rgba(59,130,246,0.8) 70%, rgba(59,130,246,0.0) 100%);
      animation: pulse-flow 2.5s ease-in-out infinite;
    }
    .pulse-line-h::after {
      background: linear-gradient(90deg, rgba(147,51,234,0.0) 0%, rgba(147,51,234,0.8) 30%, rgba(59,130,246,0.8) 70%, rgba(59,130,246,0.0) 100%);
      animation: pulse-flow-h 2.5s ease-in-out infinite;
    }
    @keyframes pulse-flow {
      0% { transform: translateY(-120%); opacity: 0.6; }
      50% { opacity: 1; }
      100% { transform: translateY(120%); opacity: 0.6; }
    }
    @keyframes pulse-flow-h {
      0% { transform: translateX(-120%); opacity: 0.6; }
      50% { opacity: 1; }
      100% { transform: translateX(120%); opacity: 0.6; }
    }

    .lucide { width: 20px; height: 20px; stroke-width: 1.5; }
    .lucide-lg { width: 24px; height: 24px; }
    .lucide-xl { width: 28px; height: 28px; }

    /* Session overlay */
    .session-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
    }
    .session-panel {
      width: 75%;
      max-height: 80vh;
      overflow-y: auto;
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
    }
    /* macOS-style scrollbars */
    .macos-scroll::-webkit-scrollbar { width: 8px; }
    .macos-scroll::-webkit-scrollbar-track { background: transparent; }
    .macos-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 100px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .macos-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.22);
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .macos-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
    .session-panel::-webkit-scrollbar { width: 8px; }
    .session-panel::-webkit-scrollbar-track { background: transparent; }
    .session-panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 100px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .session-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.22);
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .session-panel { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="fixed top-0 left-0 right-0 h-11 glass-panel flex items-center px-4 z-50">
    <div class="flex items-center gap-2">
      <i data-lucide="hexagon" class="lucide text-white/50"></i>
      <span class="font-medium text-sm tracking-wide">GoatOS</span>
    </div>
    <div class="flex-1 flex items-center justify-center gap-1" id="tab-bar"></div>
    <div class="flex items-center gap-3 text-xs text-white/40 font-mono">
      <span id="clock">--:--</span>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="pt-11 pb-20 h-screen overflow-y-auto macos-scroll" id="main-content">
    <div id="module-container" class="p-6 max-w-7xl mx-auto"></div>
  </div>

  <!-- Session Overlay (hidden by default) -->
  <div id="session-overlay" class="session-overlay" style="display:none" onclick="closeSessionOverlay(event)">
    <div class="session-panel" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-medium text-lg" id="session-overlay-title">Session Details</h3>
        <button onclick="closeSessionOverlay()" class="text-white/40 hover:text-white/80 transition">
          <i data-lucide="x" class="lucide"></i>
        </button>
      </div>
      <div id="session-overlay-content" class="font-mono text-sm text-white/70 leading-relaxed"></div>
    </div>
  </div>

  <!-- Prototype Overlay -->
  <div id="prototype-overlay" class="session-overlay" style="display:none" onclick="closePrototypeOverlay(event)">
    <div class="session-panel" style="width:75%;height:80vh;padding:0;overflow:hidden;" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between px-5 py-3 border-b border-white/8">
        <div class="flex items-center gap-3">
          <i data-lucide="boxes" class="lucide icon-lab"></i>
          <h3 class="font-medium text-sm" id="prototype-overlay-title">Prototype</h3>
          <span class="text-[10px] font-mono text-white/25" id="prototype-overlay-meta"></span>
        </div>
        <button onclick="closePrototypeOverlay()" class="text-white/40 hover:text-white/80 transition">
          <i data-lucide="x" class="lucide"></i>
        </button>
      </div>
      <div id="prototype-detail" class="p-6 overflow-y-auto macos-scroll" style="height:calc(80vh - 52px);"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Theme Picker -->
  <div class="theme-picker-btn" onclick="document.getElementById('theme-panel').classList.toggle('open')" title="Theme">
    <i data-lucide="monitor" style="width:18px;height:18px;stroke-width:1.5;"></i>
  </div>
  <div class="theme-panel" id="theme-panel"></div>

  <!-- Dock -->
  <div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50">
    <div class="glass-panel dock-container px-10 py-2 flex items-center gap-8">
      <button class="glass-dock-item rounded-xl px-5 py-2 flex items-center gap-2" data-module="ops" onclick="activateModule('ops')">
        <i data-lucide="cpu" class="lucide icon-ops"></i>
        <span class="text-xs font-medium text-white/50">Ops</span>
      </button>
      <button class="glass-dock-item rounded-xl px-5 py-2 flex items-center gap-2" data-module="brain" onclick="activateModule('brain')">
        <i data-lucide="brain" class="lucide icon-brain"></i>
        <span class="text-xs font-medium text-white/50">Brain</span>
      </button>
      <button class="glass-dock-item rounded-xl px-5 py-2 flex items-center gap-2" data-module="projects" onclick="activateModule('projects')">
        <i data-lucide="folder-kanban" class="lucide icon-projects"></i>
        <span class="text-xs font-medium text-white/50">Projects</span>
      </button>
      <button class="glass-dock-item rounded-xl px-5 py-2 flex items-center gap-2" data-module="lab" onclick="activateModule('lab')">
        <i data-lucide="flask-conical" class="lucide icon-lab"></i>
        <span class="text-xs font-medium text-white/50">Lab</span>
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    const modules = {
      ops: {
        name: 'Ops', icon: 'cpu', neon: 'neon-ops', iconClass: 'icon-ops',
        tabs: [
          { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
          { id: 'mission-control', name: 'Mission Control', icon: 'radar' },
          { id: 'org-chart', name: 'Org Chart', icon: 'network' },
          { id: 'cron-health', name: 'Cron Health', icon: 'clock' }
        ]
      },
      brain: {
        name: 'Brain', icon: 'brain', neon: 'neon-brain', iconClass: 'icon-brain',
        tabs: [
          { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
          { id: 'daily-briefs', name: 'Daily Briefs', icon: 'newspaper' },
          { id: 'automations', name: 'Automations', icon: 'workflow' },
          { id: 'os-docs', name: 'OS Docs', icon: 'book-open' }
        ]
      },
      projects: {
        name: 'Projects', icon: 'folder-kanban', neon: 'neon-projects', iconClass: 'icon-projects',
        tabs: [
          { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
          { id: 'pipeline', name: 'Pipeline', icon: 'kanban' },
          { id: 'deliverables', name: 'Deliverables', icon: 'package-check' }
        ]
      },
      lab: {
        name: 'Lab', icon: 'flask-conical', neon: 'neon-lab', iconClass: 'icon-lab',
        tabs: [
          { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
          { id: 'prototypes', name: 'Prototypes', icon: 'boxes' },
          { id: 'overnight-builds', name: 'Overnight Builds', icon: 'moon' },
          { id: 'build-logs', name: 'Build Logs', icon: 'terminal' },
          { id: 'self-improvement', name: 'Self-Improvement', icon: 'lightbulb' }
        ]
      }
    };

    let activeModule = 'ops';
    let activeTab = 'dashboard';
    let tabOrder = {};
    Object.keys(modules).forEach(m => { tabOrder[m] = modules[m].tabs.map(t => t.id); });

    const API = window.location.origin;

    // Global helpers
    const agentAvatars = { 'Goat': 'goat-avatar.png', 'Castle': 'avatar-castle.png', 'Forge': 'avatar-forge.png', 'Echo': 'avatar-echo.png', 'Vector': 'avatar-vector.png', 'Albs': 'https://ca.slack-edge.com/T8T6EBCP2-UCM6H7WJK-e87068bbbaf2-512' };
    function slaClass(date) {
      if (!date) return 'sla-ok';
      const d = new Date(date), now = new Date();
      const diff = (d - now) / (1000*60*60*24);

    function renderMarkdown(md) {
      // Lightweight markdown renderer
      let html = md
        // Headings
        .replace(/^### (.+)$/gm, '<h3 class="text-base font-medium text-sky-300/80 mt-5 mb-2">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 class="text-lg font-medium neon-brain mt-6 mb-3">$1</h2>')
        .replace(/^# (.+)$/gm, '<h1 class="text-xl font-medium neon-brain mb-4">$1</h1>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong class="text-white/80 font-medium">$1</strong>')
        // Italic
        .replace(/\*(.+?)\*/g, '<em class="text-white/60 italic">$1</em>')
        // Inline code
        .replace(/`(.+?)`/g, '<code class="font-mono text-xs bg-white/5 px-1.5 py-0.5 rounded text-sky-300/70">$1</code>')
        // List items
        .replace(/^- (.+)$/gm, '<li class="flex gap-2 items-start text-sm text-white/55 mb-1.5"><span class="text-sky-400/40 mt-1 flex-shrink-0">&#8226;</span><span>$1</span></li>')
        // Paragraphs (lines not starting with < or empty)
        .replace(/^(?!<|$|\s*$)(.+)$/gm, '<p class="text-sm text-white/50 mb-2 leading-relaxed">$1</p>');
      // Wrap consecutive <li> in <ul>
      html = html.replace(/(<li[^>]*>.*?<\/li>\s*)+/gs, (match) => {
        return '<ul class="space-y-0.5 mb-3 pl-1">' + match + '</ul>';
      });
      return '<div class="brief-content">' + html + '</div>';
    }

    // Jira sync handler
    async function syncFromJira() {
      const btn = document.getElementById('jira-sync-btn');
      if (!btn || btn.classList.contains('syncing')) return;
      btn.classList.add('syncing');
      btn.querySelector('.sync-label').textContent = 'Syncing...';
      try {
        const res = await fetch(`${API}/api/jira/sync`, { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          showToast('error', 'Jira Sync Failed', data.error);
        } else {
          const queueMsg = data.queued > 0 ? ` · ${data.queued} queued for delegation` : '';
          showToast('success', 'Jira Sync Complete', `${data.synced} issues found · ${data.created} created · ${data.updated} updated${queueMsg}`);
          // Refresh pipeline data and re-render
          await fetchPipelineData();
          renderedModules['projects'] = false;
          renderModuleContent();
          renderTabs();
          lucide.createIcons();
        }
      } catch (e) {
        showToast('error', 'Jira Sync Failed', e.message);
      } finally {
        btn.classList.remove('syncing');
        btn.querySelector('.sync-label').textContent = 'Sync from Jira';
      }
    }

    async function openSession(sessionId) {
      const session = sessionsData.find(s => s.sessionId === sessionId);
      const overlay = document.getElementById('session-overlay');
      const titleEl = document.getElementById('session-overlay-title');
      const contentEl = document.getElementById('session-overlay-content');

      titleEl.textContent = session ? (session.preview.slice(0, 50) || 'Session') : 'Session';
      contentEl.innerHTML = '<div class="text-white/30 text-sm">Loading session history...</div>';
      overlay.style.display = 'flex';

      try {
        const res = await fetch(`${API}/api/sessions/${sessionId}/history`);
        const messages = await res.json();

        let metaHtml = '';
        if (session) {
          metaHtml = `
            <div class="grid grid-cols-3 gap-4 text-xs mb-4 pb-4 border-b border-white/8">
              <div><span class="text-white/40">Model</span><br/><span class="font-mono">${session.model}</span></div>
              <div><span class="text-white/40">Channel</span><br/>${session.channel}</div>
              <div><span class="text-white/40">Messages</span><br/>${session.messageCount}</div>
            </div>
          `;
        }

        let historyHtml = '';
        if (messages.length === 0) {
          historyHtml = '<div class="text-white/20 text-sm">No messages in this session.</div>';
        } else {
          historyHtml = messages.map(m => {
            const isUser = m.role === 'user';
            const ts = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) : '';
            const escapedContent = m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br/>');
            return `
              <div class="flex gap-3 ${isUser ? '' : 'flex-row-reverse'} mb-3">
                <div class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium ${isUser ? 'bg-white/10 text-white/60' : 'bg-amber-500/15 text-amber-400/80'}">
                  ${isUser ? 'A' : 'G'}
                </div>
                <div class="max-w-[85%] rounded-xl px-4 py-3 ${isUser ? 'bg-white/[0.03] border border-white/[0.06]' : 'bg-white/[0.02] border border-white/[0.04]'}">
                  <div class="text-[10px] text-white/25 mb-1.5 flex items-center gap-2 ${isUser ? '' : 'justify-end'}">
                    <span>${isUser ? 'Albs' : 'Goat'}</span>
                    ${ts ? '<span>' + ts + '</span>' : ''}
                  </div>
                  <div class="text-sm leading-relaxed ${isUser ? 'text-white/60' : 'text-white/50'} ${isUser ? 'text-left' : 'text-right'}">${escapedContent}</div>
                </div>
              </div>
            `;
          }).join('');
        }

        contentEl.innerHTML = metaHtml + '<div class="space-y-1 macos-scroll" style="max-height:60vh;overflow-y:auto;padding-right:8px;">' + historyHtml + '</div>';
      } catch (e) {
        contentEl.innerHTML = `<div class="text-red-400/60 text-sm">Failed to load session history: ${e.message}</div>`;
      }
      lucide.createIcons();
    }

    function openPrototype(id) {
      const proto = prototypesCache.find(p => p.id === id);
      if (!proto) return;
      document.getElementById('prototype-overlay-title').textContent = proto.name;
      document.getElementById('prototype-overlay-meta').textContent = `port ${proto.port} \u00b7 ${proto.status}`;

      const created = new Date(proto.createdAt).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      const updated = new Date(proto.updatedAt).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

      document.getElementById('prototype-detail').innerHTML = `
        <div class="space-y-6">
          <!-- Status bar -->
          <div class="flex items-center gap-4">
            <span class="flex items-center gap-2 text-sm"><span class="status-dot ${proto.status === 'active' ? 'online' : 'offline'}"></span>${proto.status}</span>
            <span class="text-xs font-mono text-white/25">port ${proto.port}</span>
            <span class="text-xs font-mono text-white/25">${proto.entrypoint}</span>
          </div>

          <!-- Description -->
          <div>
            <h4 class="text-xs text-white/30 uppercase tracking-wider mb-2">Description</h4>
            <p class="text-sm text-white/55 leading-relaxed">${proto.description}</p>
          </div>

          <!-- Details grid -->
          <div class="grid grid-cols-2 gap-4">
            <div class="dashboard-card rounded-xl p-4">
              <div class="text-xs text-white/30 mb-1">Created</div>
              <div class="text-sm text-white/50 font-mono">${created}</div>
            </div>
            <div class="dashboard-card rounded-xl p-4">
              <div class="text-xs text-white/30 mb-1">Last Updated</div>
              <div class="text-sm text-white/50 font-mono">${updated}</div>
            </div>
            <div class="dashboard-card rounded-xl p-4">
              <div class="text-xs text-white/30 mb-1">Path</div>
              <div class="text-sm text-white/50 font-mono truncate">${proto.path}</div>
            </div>
            <div class="dashboard-card rounded-xl p-4">
              <div class="text-xs text-white/30 mb-1">Entry Point</div>
              <div class="text-sm text-white/50 font-mono">${proto.entrypoint}</div>
            </div>
          </div>

          <!-- Placeholder for future: file tree, recent changes, live preview -->
          <div class="dashboard-card rounded-xl p-5 border-dashed">
            <div class="flex items-center gap-3 text-white/20">
              <i data-lucide="monitor-play" class="lucide"></i>
              <div>
                <p class="text-sm">Live preview coming soon</p>
                <p class="text-xs mt-0.5">Once routing is configured, prototypes will render here in real time.</p>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('prototype-overlay').style.display = 'flex';
      lucide.createIcons();
    }

    function closePrototypeOverlay(e) {
      if (e && e.target !== document.getElementById('prototype-overlay')) return;
      document.getElementById('prototype-overlay').style.display = 'none';
    }

    function closeSessionOverlay(e) {
      if (e && e.target !== document.getElementById('session-overlay')) return;
      document.getElementById('session-overlay').style.display = 'none';
    }
    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeSessionOverlay(); closePrototypeOverlay(); }
    });

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Australia/Sydney' });
    }

    // Hot-reload: watch for file changes via polling the file's last-modified header
    let _lastModified = null;
    async function checkForUpdates() {
      try {
        const res = await fetch(location.href, { method: 'HEAD', cache: 'no-store' });
        const lm = res.headers.get('last-modified') || res.headers.get('etag');
        if (_lastModified && lm && lm !== _lastModified) {
          location.reload();
        }
        _lastModified = lm;
      } catch (e) { /* ignore */ }
    }
    setInterval(checkForUpdates, 1500);
    checkForUpdates();

    // Fetch live data from API
    // === THEME PICKER ===
    const themes = [
      { id: 'midnight', name: 'Midnight', bg: '#0a0a0a', glass: [255,255,255], dots: ['#1a1a2e','#16213e','#0f3460','#533483'] },
      { id: 'sunset', name: 'Sunset Fade', bg: '#1a0a0a', glass: [255,180,140], dots: ['#ff6b6b','#ee5a24','#f0932b','#ffbe76'] },
      { id: 'aurora', name: 'Aurora', bg: '#0a0f1a', glass: [140,180,255], dots: ['#6c5ce7','#a29bfe','#74b9ff','#0984e3'] },
      { id: 'sakura', name: 'Sakura', bg: '#150a14', glass: [220,160,220], dots: ['#e84393','#fd79a8','#b83280','#d63384'] },
      { id: 'arctic', name: 'Arctic', bg: '#0a1014', glass: [160,220,240], dots: ['#00cec9','#81ecec','#0984e3','#dfe6e9'] }
    ];

    function renderThemePanel() {
      const saved = localStorage.getItem('goatos-theme') || 'midnight';
      const panel = document.getElementById('theme-panel');
      panel.innerHTML = themes.map(t => 
        `<div class="theme-swatch ${t.id === saved ? 'active' : ''}" onclick="applyTheme('${t.id}')">
          <div class="theme-dots">${t.dots.map(c => `<div class="theme-dot" style="background:${c}"></div>`).join('')}</div>
          <span>${t.name}</span>
        </div>`
      ).join('');
    }

    function applyTheme(themeId) {
      const t = themes.find(x => x.id === themeId) || themes[0];
      document.body.style.background = t.bg;
      const [r,g,b] = t.glass;
      document.documentElement.style.setProperty('--glass-bg', `rgba(${r},${g},${b},0.04)`);
      document.documentElement.style.setProperty('--glass-border', `rgba(${r},${g},${b},0.08)`);
      document.documentElement.style.setProperty('--glass-hover', `rgba(${r},${g},${b},0.12)`);
      localStorage.setItem('goatos-theme', themeId);
      renderThemePanel();
    }

    // Close panel on outside click
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('theme-panel');
      const btn = document.querySelector('.theme-picker-btn');
      if (panel && panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('open');
      }
    });

    // Init theme
    setTimeout(() => {
      renderThemePanel();
      const saved = localStorage.getItem('goatos-theme');
      if (saved) applyTheme(saved);
    }, 50);

    // Pipeline data
    async function fetchPipelineData() {
      try {
        const [tRes, dRes] = await Promise.all([fetch(`${API}/api/tasks`), fetch(`${API}/api/deliverables`)]);
        tasksCache = await tRes.json();
        deliverablesCache = await dRes.json();
      } catch (e) { console.warn('Pipeline fetch failed:', e); }
    }

    // Kanban drag-and-drop
    let draggedTaskId = null;
    function onCardDragStart(e, taskId) {
      draggedTaskId = taskId;
      e.target.classList.add('dragging');
      e.dataTransfer.setData('text/plain', taskId);
      e.dataTransfer.effectAllowed = 'move';
    }
    function onCardDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
      draggedTaskId = null;
    }
    function onColDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
    function onColDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    async function onColDrop(e, stage) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      if (!taskId) return;
      const task = tasksCache.find(t => t.id === taskId);
      if (task && task.stage === stage) return;
      try {
        await fetch(`${API}/api/tasks/${taskId}/move`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ stage }) });
        await fetchPipelineData();
        renderedModules['projects'] = false;
        renderModuleContent();
        renderTabs();
        lucide.createIcons();
      } catch (err) { console.error('Move failed:', err); }
    }

    // Task & Deliverable detail overlays
    function buildDeliverableSection(t) {
      const fname = t.outputPath.split('/').pop();
      const baseName = fname.replace(/\.[^.]+$/, '');
      const docxName = baseName + '.docx';
      const dlDocx = API + '/api/tasks/' + encodeURIComponent(t.id) + '/download/' + encodeURIComponent(docxName);
      const dlMd = API + '/api/tasks/' + encodeURIComponent(t.id) + '/download/' + encodeURIComponent(fname);
      return '<div class="border-t border-white/8 pt-3">' +
        '<div class="text-xs text-white/30 mb-2 flex items-center gap-1"><i data-lucide="file-check" style="width:14px;height:14px;"></i>Deliverable</div>' +
        '<div class="bg-green-500/5 border border-green-500/15 rounded-lg px-4 py-3">' +
        '<div class="flex items-center gap-2 mb-3"><i data-lucide="file-text" class="text-green-400/60" style="width:16px;height:16px;"></i><span class="text-xs font-mono text-green-300/60">' + fname + '</span></div>' +
        '<div class="flex gap-2">' +
        '<a href="' + dlDocx + '" target="_blank" class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-green-500/15 text-green-300/80 text-xs font-medium hover:bg-green-500/25 transition" style="text-decoration:none;color:#86efac"><i data-lucide="download" style="width:14px;height:14px;"></i>Download .docx</a>' +
        '<a href="' + dlMd + '" target="_blank" class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-white/5 text-white/50 text-xs hover:bg-white/10 transition" style="text-decoration:none;color:rgba(255,255,255,0.5)"><i data-lucide="file-text" style="width:14px;height:14px;"></i>Download .md</a>' +
        '</div></div></div>';
    }

    function openTaskDetail(id) {
      const t = tasksCache.find(x => x.id === id);
      if (!t) return;
      const due = t.dueDate ? new Date(t.dueDate + 'T00:00:00').toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) : '--';
      const sla = t.slaDate ? new Date(t.slaDate + 'T00:00:00').toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) : '--';
      const parentDel = deliverablesCache.find(d => d.linkedTaskIds && d.linkedTaskIds.includes(t.id));
      document.getElementById('session-overlay-title').textContent = t.title;
      document.getElementById('session-overlay-content').innerHTML = `
        <div class="space-y-4">
          ${parentDel ? '<div class="bg-amber-500/5 border border-amber-500/15 rounded-lg px-4 py-3 flex items-center justify-between cursor-pointer hover:bg-amber-500/8 transition" onclick="event.stopPropagation(); closeSessionOverlay(); setTimeout(() => openDeliverableDetail(\'' + parentDel.id + '\'), 100)"><div class="flex items-center gap-2"><i data-lucide="package" class="icon-ops" style="width:16px;height:16px;"></i><span class="text-xs text-white/50">Deliverable:</span><span class="text-xs text-white/70">' + parentDel.title + '</span></div><i data-lucide="chevron-right" class="text-white/20" style="width:14px;height:14px;"></i></div>' : ''}
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Stage</div><span class="stage-badge stage-${t.stage}">${t.stage}</span></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Priority</div><div class="text-sm text-white/60">${t.priority}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Assignee</div><div class="flex items-center gap-1.5 text-sm text-white/60">${agentAvatars[t.assignee] ? '<img src="' + agentAvatars[t.assignee] + '" class="w-4 h-4 rounded-full object-cover" />' : ''}${t.assignee || '--'}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Client</div><div class="text-sm text-white/60">${t.client}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Due Date</div><div class="text-sm font-mono ${slaClass(t.dueDate)}">${due}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">SLA Date</div><div class="text-sm font-mono ${slaClass(t.slaDate)}">${sla}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Owner</div><div class="flex items-center gap-1.5 text-sm text-white/60">${agentAvatars[t.owner] ? '<img src="' + agentAvatars[t.owner] + '" class="w-4 h-4 rounded-full object-cover" />' : ''}${t.owner}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">ID</div><div class="text-sm font-mono text-white/40">${t.id}</div></div>
          </div>
          <div class="border-t border-white/8 pt-3"><div class="text-xs text-white/30 mb-1">Description</div><p class="text-sm text-white/55 leading-relaxed">${t.description}</p></div>
          ${t.blockers && t.blockers.length > 0 ? '<div class="border-t border-white/8 pt-3"><div class="text-xs text-red-400/50 mb-2 flex items-center gap-1"><i data-lucide="alert-triangle" style="width:14px;height:14px;"></i>Blockers</div>' + t.blockers.map(b => '<div class="text-sm text-red-400/40 bg-red-500/5 rounded-lg px-3 py-2 mb-1">' + b + '</div>').join('') + '</div>' : ''}
          ${t.outputPath ? buildDeliverableSection(t) : ''}
          <div class="border-t border-white/8 pt-3"><div class="text-xs text-white/30 mb-2">Status History</div><div class="space-y-2">${(t.statusHistory || []).slice().reverse().map(h => { const ts = new Date(h.timestamp).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Sydney' }); return '<div class="flex items-start gap-3"><span class="stage-badge stage-' + h.stage + ' flex-shrink-0">' + h.stage + '</span><div><div class="text-xs text-white/50">' + (h.note || '') + '</div><div class="text-[10px] text-white/25 font-mono mt-0.5">' + ts + '</div></div></div>'; }).join('')}</div></div>
        </div>`;
      document.getElementById('session-overlay').style.display = 'flex';
      lucide.createIcons();
    }

    function openDeliverableDetail(id) {
      const d = deliverablesCache.find(x => x.id === id);
      if (!d) return;
      const sla = d.slaDate ? new Date(d.slaDate + 'T00:00:00').toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) : '--';
      const linked = tasksCache.filter(t => d.linkedTaskIds.includes(t.id));
      const delBadge = {'on-track':'stage-done','at-risk':'stage-in-progress','overdue':'stage-pending','delivered':'stage-new'};
      document.getElementById('session-overlay-title').textContent = d.title;
      document.getElementById('session-overlay-content').innerHTML = `
        <div class="space-y-4">
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Status</div><span class="stage-badge ${delBadge[d.status] || 'stage-new'}">${d.status}</span></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Client</div><div class="text-sm text-white/60">${d.client}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">Owner</div><div class="text-sm text-white/60">${d.owner}</div></div>
            <div class="bg-white/5 rounded-lg p-3"><div class="text-[10px] text-white/30 mb-0.5">SLA Date</div><div class="text-sm font-mono ${slaClass(d.slaDate)}">${sla}</div></div>
          </div>
          <div class="border-t border-white/8 pt-3"><div class="text-xs text-white/30 mb-1">Description</div><p class="text-sm text-white/55 leading-relaxed">${d.description}</p></div>
          ${linked.length > 0 ? '<div class="border-t border-white/8 pt-3"><div class="text-xs text-white/30 mb-2">Linked Tasks</div><div class="space-y-1">' + linked.map(t => '<div class="flex items-center justify-between bg-white/3 rounded-lg px-3 py-2 cursor-pointer hover:bg-white/5" onclick="event.stopPropagation(); closeSessionOverlay(); setTimeout(() => openTaskDetail(\'' + t.id + '\'), 100)"><span class="text-xs text-white/50">' + t.title + '</span><span class="stage-badge stage-' + t.stage + '">' + t.stage + '</span></div>').join('') + '</div></div>' : ''}
          <div class="border-t border-white/8 pt-3"><div class="text-xs text-white/30 mb-2">Status History</div><div class="space-y-2">${(d.statusHistory || []).slice().reverse().map(h => { const ts = new Date(h.timestamp).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Sydney' }); return '<div class="flex items-start gap-3"><span class="stage-badge ' + (delBadge[h.status] || 'stage-new') + ' flex-shrink-0">' + h.status + '</span><div><div class="text-xs text-white/50">' + (h.note || '') + '</div><div class="text-[10px] text-white/25 font-mono mt-0.5">' + ts + '</div></div></div>'; }).join('')}</div></div>
        </div>`;
      document.getElementById('session-overlay').style.display = 'flex';
      lucide.createIcons();
    }

    async function fetchLiveData() {
      try {
        const res = await fetch(`${API}/api/sessions`);
        const newData = await res.json();
        const changed = JSON.stringify(newData) !== JSON.stringify(sessionsData);
        sessionsData = newData;
        // Re-render Ops whenever session data changes
        if (changed && renderedModules['ops']) {
          const savedTab = activeTab;
          const savedModule = activeModule;
          renderedModules['ops'] = false;
          // Temporarily switch to ops for render, then restore
          activeModule = 'ops';
          activeTab = savedModule === 'ops' ? savedTab : 'dashboard';
          renderModuleContent();
          // Restore original module/tab if user wasn't on ops
          if (savedModule !== 'ops') {
            activeModule = savedModule;
            activeTab = savedTab;
            const opsWrapper = document.getElementById('module-ops');
            if (opsWrapper) opsWrapper.style.display = 'none';
            const curWrapper = document.getElementById('module-' + savedModule);
            if (curWrapper) curWrapper.style.display = 'block';
          }
          lucide.createIcons();
        }
      } catch (e) { console.warn('API fetch failed:', e); }
    }

    // Init — fetch all data before first render so dashboards have real data
    async function toggleCron(jobId, enabled) {
      try {
        await fetch(`${API}/api/cron/${jobId}/toggle`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled })
        });
        // Refresh cron data and re-render
        await fetchCronData();
        renderedModules['ops'] = false;
        renderModuleContent();
        lucide.createIcons();
      } catch (e) { console.error('Toggle cron failed:', e); }
    }

    async function fetchCronData() {
      try {
        const res = await fetch(`${API}/api/cron`);
        cronCache = await res.json();
      } catch (e) { console.warn('Cron fetch failed:', e); }
    }

    Promise.all([fetchLiveData(), fetchBriefs(), fetchLabData(), fetchCronData(), fetchPipelineData()]).then(() => {
      activateModule('ops');
    });
    setInterval(fetchLiveData, 15000);
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
